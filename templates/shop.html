{% extends "layout.html" %}

{% block content %}
<section class="section">
    <h2><i class="fas fa-shopping-bag"></i> {{ t['shop_page_title'] }}</h2>
    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">{{ t['shop_desc_text'] }}</p>

    <div class="shop-grid">
        {% for product in products %}
        <div class="product-card">
            <div class="badge">{{ t['trending'] }}</div>
            <img src="{{ url_for('static', filename='image/' + product.image) }}" alt="{{ product.translated_name[lang] }}">
            <h3 style="margin-bottom: 0.5rem; color: var(--text-primary);">{{ product.translated_name[lang] }}</h3>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <span style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color);">{{ product.price }}</span>
                <span style="font-size: 0.8rem; color: var(--accent-color); background: rgba(56, 189, 248, 0.1); padding: 0.2rem 0.6rem; border-radius: 5px;">{{ t['organic'] }}</span>
            </div>
            <p style="font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-secondary); height: 3rem; overflow: hidden;">{{ product.usage[lang] }}</p>
            <button class="btn btn-primary" style="width: 100%;">{{ t['buy'] }}</button>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
